name: .NET Build Validation
# runs on PRs targeting main - if this fails it's YOUR fault, fix your shit before opening a PR
on:
  pull_request:
    branches:
      - main

# needs write perms to slap labels on PRs, apparently this isn't obvious to github
permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  build-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6.0.2
      with:
        fetch-depth: 0
        submodules: 'false'
        token: ${{ secrets.GH_PAT }}

    - name: Initialize submodules with PAT
      # yes we need the PAT here, private submodules are a thing, stop asking
      run: |
        git config --global url."https://${{ secrets.GH_PAT }}:x-oauth-basic@github.com/".insteadOf "https://github.com/"
        git submodule update --init --recursive

    - name: Setup .NET
      uses: actions/setup-dotnet@v5.2.0
      with:
        # LumoraCore and LumoraCDN are net10.0 - net9 will NOT build them, learned this the hard way
        # whoever changed the csproj targets without updating this workflow, i hate you
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      # continue-on-error so we can still slap the label on before dying
      run: dotnet restore LumoraGodot/Lumora.sln
      continue-on-error: true

    - name: Build solution
      id: build
      # ExportRelease maps to Release for LumoraCore in the sln - don't touch this config name
      run: dotnet build LumoraGodot/Lumora.sln --no-restore --configuration ExportRelease
      continue-on-error: true

    - name: Add build-error label if build fails
      if: steps.build.outcome == 'failure'
      uses: actions/github-script@v8.0.0
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          github.rest.issues.addLabels({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            labels: ['build-error']
          })

    - name: Add build-success label if build succeeds
      if: steps.build.outcome == 'success'
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          github.rest.issues.addLabels({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            labels: ['build-success']
          })

    - name: Fail if build errors found
      if: steps.build.outcome == 'failure'
      run: |
        echo "::error::Build failed. Fix your damn build errors before asking for a merge."
        exit 1
