name: Feature Request
description: Recommend a feature for consideration.
issue_type: Feature

body:
  - type: select
    id: application-type
    attributes:
      label: Application Type
      description: Select the context this feature belongs to.
      options:
        - value: main-application
          label: Main Application
        - value: debug-window
          label: Debug Window
        - value: other
          label: Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Related Problem
      description: Is your feature request related to a problem? Please describe the issue or frustration.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see implemented. Include any links to libraries or resources that might help implement this feature.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Detail any alternative solutions or approaches you've considered.
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any extra details or context that might be helpful.
    validations:
      required: false
  - type: textarea
    id: requesters
    attributes:
      label: Requester Credits
      description: List usernames of anyone who has requested this feature (including yourself) for credit in release notes.
