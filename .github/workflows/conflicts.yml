name: 'Check for merge conflicts'
on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      pull_number:
        description: 'Pull request number to check'
        required: true
  schedule:
    # Run nightly at 3:00 AM UTC.
    - cron: '0 3 * * *'
jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Label PRs with merge conflicts
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const labelName = 'Has Conflicts';
            const mergeableRetryDelaySeconds = 2;
            const singlePrRetryAttempts = 3;
            const sweepRetryAttempts = 1;
            const isForkPullRequest = context.eventName === 'pull_request'
              && context.payload.pull_request?.head?.repo?.fork;
            if (isForkPullRequest) {
              console.log('Skipping label operations for forked pull_request events.');
              return;
            }
            // Ensure the label exists
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: labelName
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: labelName,
                  color: 'e11d48'
                });
              } else {
                throw e;
              }
            }

            const workflowDispatchInput = context.eventName === 'workflow_dispatch'
              ? context.payload.inputs?.pull_number
              : null;
            const workflowDispatchNumber = context.eventName === 'workflow_dispatch'
              ? parseInt(workflowDispatchInput, 10)
              : null;

            if (context.eventName === 'workflow_dispatch' && (!Number.isFinite(workflowDispatchNumber) || workflowDispatchNumber <= 0)) {
              throw new Error('workflow_dispatch requires a positive numeric pull_number input.');
            }

            const isScheduledEvent = context.eventName === 'schedule';
            const scheduledLookbackDays = 7;
            const scheduledMaxPrs = 200;
            const scheduledSinceDate = new Date(Date.now() - scheduledLookbackDays * 24 * 60 * 60 * 1000);
            let scheduledCollectedCount = 0;

            const prs = context.payload.pull_request
              ? [context.payload.pull_request]
              : workflowDispatchNumber
                ? [{ number: workflowDispatchNumber }]
                : isScheduledEvent
                  ? await github.paginate(
                      github.rest.pulls.list,
                      {
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        state: 'open',
                        sort: 'updated',
                        direction: 'desc',
                        per_page: 100
                      },
                      (response, done) => {
                        const filtered = [];
                        for (const pr of response.data) {
                          const updatedAt = new Date(pr.updated_at);
                          if (updatedAt < scheduledSinceDate) {
                            done();
                            break;
                          }
                          filtered.push(pr);
                          scheduledCollectedCount += 1;
                          if (scheduledCollectedCount >= scheduledMaxPrs) {
                            done();
                            break;
                          }
                        }
                        return filtered;
                      }
                    )
                  : await github.paginate(github.rest.pulls.list, {
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      state: 'open'
                    });
            const mergeableRetryAttempts = prs.length === 1
              ? singlePrRetryAttempts
              : sweepRetryAttempts;

            for (const pr of prs) {
              const prNumber = pr.number;
              let prDetail;
              let mergeableStateKnown = false;
              for (let attempt = 0; attempt < mergeableRetryAttempts; attempt++) {
                const response = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber
                });
                prDetail = response.data;

                mergeableStateKnown = prDetail.mergeable_state !== 'unknown';
                if (mergeableStateKnown) {
                  break;
                }

                if (attempt < mergeableRetryAttempts - 1) {
                  await new Promise(resolve => setTimeout(resolve, mergeableRetryDelaySeconds * 1000));
                }
              }

              if (!mergeableStateKnown) {
                continue;
              }

              // mergeable_state can be clean, dirty, blocked, behind, unstable, unknown, or has_hooks; see
              // https://docs.github.com/en/rest/pulls/pulls#get-a-pull-request. This workflow treats only dirty as a conflict.
              const hasConflicts = prDetail.mergeable_state === 'dirty';
              const hasConflictLabel = prDetail.labels.some(l => l.name === labelName);

              if (hasConflicts && !hasConflictLabel) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  labels: [labelName]
                });
              } else if (!hasConflicts && hasConflictLabel) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  name: labelName
                });
              }
              // If mergeability is unknown after retries, skip (still being computed by GitHub)
            }
