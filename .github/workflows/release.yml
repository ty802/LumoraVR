name: Release Build

# Manual-dispatch only. Builds Godot Mono release exports for Linux + Windows,
# stamps a date-based version into the binaries, packages each platform into a
# zip, and attaches them to a GitHub Release tagged v<version>.
#
# Version format: YYYY.MM.DD.<run_number> (e.g. 2026.05.07.142). Override with
# the version_override input if you need a hotfix or custom version string.
on:
  workflow_dispatch:
    inputs:
      version_override:
        description: "Version override (leave empty for date-based YYYY.MM.DD.<run>)"
        required: false
        default: ""
      release_notes:
        description: "Release notes body"
        required: false
        default: "Manual release build."
      prerelease:
        description: "Mark the GitHub Release as prerelease"
        required: false
        default: true
        type: boolean
      draft:
        description: "Create as draft (won't publish until you click 'Publish')"
        required: false
        default: false
        type: boolean

env:
  GODOT_VERSION: 4.7-dev4
  DOTNET_VERSION: 10.0.x
  SOLUTION_PATH: LumoraGodot/Lumora.sln
  GODOT_PROJECT_DIR: LumoraGodot

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set.outputs.version }}
      tag: ${{ steps.set.outputs.tag }}
    steps:
      - id: set
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.version_override }}" ]; then
            VERSION="${{ inputs.version_override }}"
          else
            VERSION="$(date -u +%Y.%m.%d).${{ github.run_number }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

  build-linux:
    needs: version
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          submodules: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Godot + export templates
        run: |
          set -euo pipefail
          GV="${GODOT_VERSION}"

          curl -fLO "https://godot-releases.nbg1.your-objectstorage.com/${GV}/Godot_v${GV}_mono_linux_x86_64.zip"
          unzip -q "Godot_v${GV}_mono_linux_x86_64.zip"
          sudo mv "Godot_v${GV}_mono_linux_x86_64" /opt/godot
          sudo ln -s "/opt/godot/Godot_v${GV}_mono_linux.x86_64" /usr/local/bin/godot
          godot --version

          curl -fLO "https://godot-releases.nbg1.your-objectstorage.com/${GV}/Godot_v${GV}_mono_export_templates.tpz"
          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/${GV/-/.}.mono"
          mkdir -p "$TEMPLATE_DIR"
          rm -rf /tmp/tpl
          unzip -q "Godot_v${GV}_mono_export_templates.tpz" -d /tmp/tpl
          mv /tmp/tpl/templates/* "$TEMPLATE_DIR/"

      - name: Stamp BuildInfo.cs
        run: |
          set -euo pipefail
          mkdir -p LumoraCore/Source/Generated
          cat > LumoraCore/Source/Generated/BuildInfo.cs <<EOF
          // <auto-generated/>
          // Generated by .github/workflows/release.yml - do not edit by hand.
          namespace Lumora.Core;

          public static class BuildInfo
          {
              public const string Version = "${VERSION}";
              public const string Commit = "${{ github.sha }}";
              public const string Branch = "${{ github.ref_name }}";
              public const string BuildDate = "$(date -u +%Y-%m-%dT%H:%M:%SZ)";
              public const string Configuration = "ExportRelease";
          }
          EOF

      - name: Stamp export metadata
        working-directory: ${{ env.GODOT_PROJECT_DIR }}
        run: |
          set -euo pipefail
          sed -i \
            -e "s/^application\\/file_version=.*/application\\/file_version=\"${VERSION}\"/" \
            -e "s/^application\\/product_version=.*/application\\/product_version=\"${VERSION}\"/" \
            export_presets.cfg

      - name: Build .NET solution
        run: |
          dotnet restore "${SOLUTION_PATH}"
          dotnet build "${SOLUTION_PATH}" \
            --no-restore \
            --configuration ExportRelease \
            -p:Version=${VERSION}

      - name: Godot import pass
        working-directory: ${{ env.GODOT_PROJECT_DIR }}
        run: godot --headless --import || true

      - name: Export Linux
        working-directory: ${{ env.GODOT_PROJECT_DIR }}
        run: |
          set -euo pipefail
          mkdir -p ../build/linux
          godot --headless --export-release "Linux" ../build/linux/LumoraVR.x86_64
          ls -la ../build/linux

      - name: Package zip
        run: |
          set -euo pipefail
          chmod +x build/linux/LumoraVR.x86_64 || true
          cd build/linux
          zip -r "../LumoraVR-${VERSION}-linux-x64.zip" .
          cd ..
          ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: build/LumoraVR-${{ needs.version.outputs.version }}-linux-x64.zip
          if-no-files-found: error
          retention-days: 14

  build-windows:
    needs: version
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          submodules: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Godot + export templates
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $gv = $env:GODOT_VERSION

          Invoke-WebRequest -Uri "https://godot-releases.nbg1.your-objectstorage.com/$gv/Godot_v${gv}_mono_win64.zip" -OutFile godot.zip
          Expand-Archive -Path godot.zip -DestinationPath godot
          $consoleExe = Get-ChildItem godot -Recurse -Filter "*console*.exe" | Select-Object -First 1
          if (-not $consoleExe) { throw "Godot console exe not found in archive" }
          "GODOT_EXE=$($consoleExe.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Add-Content $env:GITHUB_PATH $consoleExe.Directory.FullName
          & $consoleExe.FullName --version

          Invoke-WebRequest -Uri "https://godot-releases.nbg1.your-objectstorage.com/$gv/Godot_v${gv}_mono_export_templates.tpz" -OutFile templates.tpz
          $templatesDir = Join-Path $env:APPDATA "Godot\export_templates\$($gv -replace '-','.').mono"
          New-Item -ItemType Directory -Force -Path $templatesDir | Out-Null
          if (Test-Path tpl) {
            Remove-Item tpl -Recurse -Force
          }
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          [System.IO.Compression.ZipFile]::ExtractToDirectory((Join-Path (Get-Location) "templates.tpz"), (Join-Path (Get-Location) "tpl"))
          Copy-Item -Recurse "tpl\templates\*" $templatesDir

      - name: Stamp BuildInfo.cs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p LumoraCore/Source/Generated
          cat > LumoraCore/Source/Generated/BuildInfo.cs <<EOF
          // <auto-generated/>
          // Generated by .github/workflows/release.yml - do not edit by hand.
          namespace Lumora.Core;

          public static class BuildInfo
          {
              public const string Version = "${VERSION}";
              public const string Commit = "${{ github.sha }}";
              public const string Branch = "${{ github.ref_name }}";
              public const string BuildDate = "$(date -u +%Y-%m-%dT%H:%M:%SZ)";
              public const string Configuration = "ExportRelease";
          }
          EOF

      - name: Stamp export metadata
        shell: pwsh
        working-directory: ${{ env.GODOT_PROJECT_DIR }}
        run: |
          $ErrorActionPreference = 'Stop'
          $path = "export_presets.cfg"
          $content = Get-Content $path -Raw
          $content = $content -replace 'application/file_version=".*"', "application/file_version=""$env:VERSION"""
          $content = $content -replace 'application/product_version=".*"', "application/product_version=""$env:VERSION"""
          Set-Content -Path $path -Value $content -NoNewline

      - name: Build .NET solution
        run: |
          dotnet restore ${{ env.SOLUTION_PATH }}
          dotnet build ${{ env.SOLUTION_PATH }} --no-restore --configuration ExportRelease -p:Version=${{ needs.version.outputs.version }}

      - name: Godot import pass
        working-directory: ${{ env.GODOT_PROJECT_DIR }}
        shell: pwsh
        run: |
          # Godot 4.6.2 on Windows imports cleanly but then hangs (or
          # segfaults) on shutdown after "Loading editor layout" - the
          # actual work is done by the time it gets stuck. Run with a
          # hard timeout and kill it once it overruns; the cache it
          # generated up to that point is what --export-release needs.
          # - xlinka
          $proc = Start-Process -FilePath $env:GODOT_EXE `
            -ArgumentList '--headless','--import' `
            -NoNewWindow -PassThru
          if (-not $proc.WaitForExit(240000)) {
            Write-Host "Godot import pass exceeded 240s; killing PID $($proc.Id)"
            try { $proc.Kill($true) } catch { Write-Host "Kill failed: $_" }
            $proc.WaitForExit(15000) | Out-Null
          } elseif ($proc.ExitCode -ne 0) {
            Write-Host "Ignoring Godot import exit code $($proc.ExitCode)"
          }

      - name: Export Windows
        working-directory: ${{ env.GODOT_PROJECT_DIR }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path "..\build\windows" | Out-Null
          & $env:GODOT_EXE --headless --export-release "Windows Desktop" ..\build\windows\LumoraVR.exe
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
          Get-ChildItem ..\build\windows

      - name: Package zip
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = "${{ needs.version.outputs.version }}"
          Compress-Archive -Path "build\windows\*" -DestinationPath "build\LumoraVR-$version-windows-x64.zip"
          Get-ChildItem build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: build/LumoraVR-${{ needs.version.outputs.version }}-windows-x64.zip
          if-no-files-found: error
          retention-days: 14

  build-android:
    needs: version
    runs-on: ubuntu-latest
    # Godot's release-signing validator (has_valid_keystore_credentials)
    # parses keytool stdout and rejects valid credentials on CI - it checks
    # the first 14 bytes of output for "keytool error:" instead of the exit
    # code. We sidestep it by flipping package/signed=false in the preset
    # (Godot exports an unaligned/unsigned APK) and run apksigner ourselves
    # with the release keystore decoded from secrets.
    #
    # Required GitHub Secrets:
    #   ANDROID_RELEASE_KEYSTORE_B64       base64 of release.keystore
    #                                       (base64 -w0 release.keystore)
    #   ANDROID_RELEASE_KEYSTORE_PASSWORD  storepass
    #   ANDROID_RELEASE_KEY_ALIAS          alias inside the keystore
    #   ANDROID_RELEASE_KEY_PASSWORD       optional; defaults to storepass
    #                                       if the alias was created with a
    #                                       matching key password.
    #
    # Generate the keystore once locally:
    #   keytool -genkey -v -keystore lumora-release.keystore -alias lumora \
    #           -keyalg RSA -keysize 2048 -validity 10000
    # - xlinka
    env:
      VERSION: ${{ needs.version.outputs.version }}
      # Android NDK pinned to the version Godot 4.6 ships with. Bumping this
      # has historically caused link-time crashes inside the OpenXR vendor
      # loaders - keep in sync with Godot release notes when upgrading.
      ANDROID_NDK_VERSION: "23.2.8568313"
      ANDROID_BUILD_TOOLS_VERSION: "34.0.0"
      ANDROID_PLATFORM: "android-34"
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          submodules: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK + cmdline-tools
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;${{ env.ANDROID_PLATFORM }} build-tools;${{ env.ANDROID_BUILD_TOOLS_VERSION }} ndk;${{ env.ANDROID_NDK_VERSION }}"

      - name: Install Godot + export templates
        run: |
          set -euo pipefail
          GV="${GODOT_VERSION}"

          curl -fLO "https://godot-releases.nbg1.your-objectstorage.com/${GV}/Godot_v${GV}_mono_linux_x86_64.zip"
          unzip -q "Godot_v${GV}_mono_linux_x86_64.zip"
          sudo mv "Godot_v${GV}_mono_linux_x86_64" /opt/godot
          sudo ln -s "/opt/godot/Godot_v${GV}_mono_linux.x86_64" /usr/local/bin/godot
          godot --version

          curl -fLO "https://godot-releases.nbg1.your-objectstorage.com/${GV}/Godot_v${GV}_mono_export_templates.tpz"
          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/${GV/-/.}.mono"
          mkdir -p "$TEMPLATE_DIR"
          rm -rf /tmp/tpl
          unzip -q "Godot_v${GV}_mono_export_templates.tpz" -d /tmp/tpl
          mv /tmp/tpl/templates/* "$TEMPLATE_DIR/"

      - name: Configure Godot editor settings (SDK + JDK paths)
        run: |
          set -euo pipefail
          # Godot's Android exporter reads tool paths from editor_settings-4.tres,
          # which doesn't exist on a fresh CI runner. We write a minimal one with
          # just the SDK + JDK pointers; everything else falls back to defaults.
          # ANDROID_HOME is set by android-actions/setup-android, JAVA_HOME by
          # actions/setup-java.
          # - xlinka
          mkdir -p "$HOME/.config/godot"
          cat > "$HOME/.config/godot/editor_settings-4.tres" <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "${ANDROID_HOME}"
          export/android/java_sdk_path = "${JAVA_HOME}"
          EOF

      - name: Stamp BuildInfo.cs
        run: |
          set -euo pipefail
          mkdir -p LumoraCore/Source/Generated
          cat > LumoraCore/Source/Generated/BuildInfo.cs <<EOF
          // <auto-generated/>
          // Generated by .github/workflows/release.yml - do not edit by hand.
          namespace Lumora.Core;

          public static class BuildInfo
          {
              public const string Version = "${VERSION}";
              public const string Commit = "${{ github.sha }}";
              public const string Branch = "${{ github.ref_name }}";
              public const string BuildDate = "$(date -u +%Y-%m-%dT%H:%M:%SZ)";
              public const string Configuration = "ExportRelease";
          }
          EOF

      - name: Stamp export metadata and disable APK signing
        working-directory: ${{ env.GODOT_PROJECT_DIR }}
        run: |
          set -euo pipefail
          sed -i \
            -e "s/^application\\/file_version=.*/application\\/file_version=\"${VERSION}\"/" \
            -e "s/^application\\/product_version=.*/application\\/product_version=\"${VERSION}\"/" \
            -e "s/^package\\/signed=.*/package\\/signed=false/" \
            export_presets.cfg

      - name: Decode Android release keystore
        working-directory: ${{ env.GODOT_PROJECT_DIR }}
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${KEYSTORE_B64:-}" ] || [ -z "${KEYSTORE_PASSWORD:-}" ] || [ -z "${KEY_ALIAS:-}" ]; then
            echo "::error::Missing one of ANDROID_RELEASE_KEYSTORE_B64, ANDROID_RELEASE_KEYSTORE_PASSWORD, ANDROID_RELEASE_KEY_ALIAS."
            exit 1
          fi
          echo "::add-mask::${KEYSTORE_PASSWORD}"
          echo "::add-mask::${KEY_ALIAS}"
          if [ -n "${KEY_PASSWORD:-}" ]; then
            echo "::add-mask::${KEY_PASSWORD}"
          fi

          # Strip whitespace/newlines that paste-style secrets sometimes carry.
          printf '%s' "${KEYSTORE_B64}" | tr -d '\r\n ' | base64 -d > release.keystore
          echo "Decoded release.keystore: $(stat -c '%s bytes' release.keystore)"

          # Storepass + alias sanity check. apksigner does a full check later,
          # but failing here means we don't waste time on the export first.
          if ! keytool -list \
            -keystore release.keystore \
            -storepass "${KEYSTORE_PASSWORD}" \
            -alias "${KEY_ALIAS}" \
            >/dev/null 2>&1; then
            echo "::error::keytool rejected the storepass or alias. Check ANDROID_RELEASE_KEYSTORE_PASSWORD and ANDROID_RELEASE_KEY_ALIAS."
            exit 1
          fi
          echo "Release keystore validated."

      - name: Build .NET solution
        run: |
          dotnet restore "${SOLUTION_PATH}"
          dotnet build "${SOLUTION_PATH}" \
            --no-restore \
            --configuration ExportRelease \
            -p:Version=${VERSION}

      - name: Godot import pass
        working-directory: ${{ env.GODOT_PROJECT_DIR }}
        run: godot --headless --import || true

      - name: Install Android build template (manual extract)
        working-directory: ${{ env.GODOT_PROJECT_DIR }}
        run: |
          set -euo pipefail
          # The "official" route is `godot --headless --install-android-build-template`
          # but that runs Godot in editor mode, which loads C# scripts via the
          # editor's Debug-config assembly. We only build ExportRelease here,
          # so the editor pass dies with "Cannot instantiate C# script".
          #
          # Editor mode also tries to spin up OpenXR (because xr/openxr/enabled
          # is true in project.godot) and logs a noisy failure on Linux CI with
          # no runtime installed. Avoiding the editor pass kills that too.
          #
          # Instead we extract android_source.zip directly. That zip ships
          # inside the mono export templates and IS what install-android-build-
          # template would have extracted - we just cut Godot out of the loop.
          # - xlinka
          GV="${GODOT_VERSION}"
          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/${GV/-/.}.mono"
          ANDROID_TEMPLATE_ZIP="${TEMPLATE_DIR}/android_source.zip"

          if [ ! -f "${ANDROID_TEMPLATE_ZIP}" ]; then
            echo "Android build template zip not found at: ${ANDROID_TEMPLATE_ZIP}"
            echo "Listing template dir for debugging:"
            ls -la "${TEMPLATE_DIR}" || true
            exit 1
          fi

          # Godot's --install-android-build-template extracts the zip into
          # `android/build/` (not into `android/` itself). The zip's root
          # contains the build files at top level. Extract there so paths
          # line up with what gradle and the export preset expect.
          rm -rf android
          mkdir -p android/build
          unzip -q -o "${ANDROID_TEMPLATE_ZIP}" -d android/build/
          test -f android/build/build.gradle || { echo "Android build template extracted but build.gradle missing"; ls -laR android || true; exit 1; }

          # The editor's --install-android-build-template also writes a
          # version marker file. Without it, the gradle export step fails
          # with: "Trying to build from a gradle built template, but no
          # version info for it exists." Content must match Godot's
          # VERSION_FULL_CONFIG (major.minor.patch.status[.module_config])
          # for the running editor; we derive it from GODOT_VERSION.
          # - xlinka
          GODOT_VERSION_FULL_CONFIG="${GV/-/.}.mono"
          printf '%s' "${GODOT_VERSION_FULL_CONFIG}" > android/.build_version
          printf '%s' "${GODOT_VERSION_FULL_CONFIG}" > android/build/version.txt

          # And the editor also drops .gdignore files so its filesystem
          # scanner does not index the build template tree. Without these,
          # the second Android export (Pico after Quest) sees the merged
          # assets/resources Quest wrote, registers every OpenXR singleton
          # twice, and creates .webp.import companions in res/mipmap-*/
          # that gradle's resource merger then rejects. - xlinka
          touch android/.gdignore android/build/.gdignore
          echo "Android build template installed at android/build/ (version: ${GODOT_VERSION_FULL_CONFIG})"

      - name: Export Quest APK (unsigned)
        working-directory: ${{ env.GODOT_PROJECT_DIR }}
        run: |
          set -euo pipefail
          mkdir -p ../build/android
          godot --headless --verbose --export-release "Quest" ../build/android/LumoraVR-Quest.apk
          ls -la ../build/android

      - name: Export Pico APK (unsigned)
        working-directory: ${{ env.GODOT_PROJECT_DIR }}
        run: |
          set -euo pipefail
          godot --headless --export-release "Pico" ../build/android/LumoraVR-Pico.apk
          ls -la ../build/android

      - name: Sign Quest + Pico APKs with apksigner
        working-directory: ${{ env.GODOT_PROJECT_DIR }}
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          echo "::add-mask::${KEYSTORE_PASSWORD}"
          echo "::add-mask::${KEY_ALIAS}"
          if [ -n "${KEY_PASSWORD:-}" ]; then
            echo "::add-mask::${KEY_PASSWORD}"
          fi
          # apksigner reads --key-pass from --ks-pass when omitted; we always
          # pass it explicitly so a keystore with a distinct key password
          # works without any extra alignment step.
          KEY_PASS="${KEY_PASSWORD:-$KEYSTORE_PASSWORD}"

          APKSIGNER="${ANDROID_HOME}/build-tools/${ANDROID_BUILD_TOOLS_VERSION}/apksigner"
          ZIPALIGN="${ANDROID_HOME}/build-tools/${ANDROID_BUILD_TOOLS_VERSION}/zipalign"
          [ -x "${APKSIGNER}" ] || { echo "::error::apksigner not found at ${APKSIGNER}"; exit 1; }
          [ -x "${ZIPALIGN}" ] || { echo "::error::zipalign not found at ${ZIPALIGN}"; exit 1; }

          for APK in ../build/android/LumoraVR-Quest.apk ../build/android/LumoraVR-Pico.apk; do
            echo "::group::Sign ${APK}"
            ALIGNED="${APK%.apk}-aligned.apk"
            "${ZIPALIGN}" -p -f 4 "${APK}" "${ALIGNED}"
            mv "${ALIGNED}" "${APK}"
            "${APKSIGNER}" sign \
              --ks release.keystore \
              --ks-pass "pass:${KEYSTORE_PASSWORD}" \
              --ks-key-alias "${KEY_ALIAS}" \
              --key-pass "pass:${KEY_PASS}" \
              "${APK}"
            "${APKSIGNER}" verify --verbose "${APK}"
            echo "::endgroup::"
          done

      # Defence-in-depth: wipe the decoded keystore even if signing or
      # later steps fail. The uploaded artifacts only need the APKs/zips.
      - name: Scrub Android signing credentials from workspace
        if: always()
        working-directory: ${{ env.GODOT_PROJECT_DIR }}
        run: rm -f release.keystore

      - name: Package zips
        run: |
          set -euo pipefail
          cd build/android
          zip "../LumoraVR-${VERSION}-quest.zip" LumoraVR-Quest.apk
          zip "../LumoraVR-${VERSION}-pico.zip"  LumoraVR-Pico.apk
          cd ..
          ls -la

      - name: Upload Quest artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-quest
          path: build/LumoraVR-${{ needs.version.outputs.version }}-quest.zip
          if-no-files-found: error
          retention-days: 14

      - name: Upload Pico artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-pico
          path: build/LumoraVR-${{ needs.version.outputs.version }}-pico.zip
          if-no-files-found: error
          retention-days: 14

  release:
    needs: [version, build-linux, build-windows, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -laR artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          body: ${{ inputs.release_notes }}
          prerelease: ${{ inputs.prerelease }}
          draft: ${{ inputs.draft }}
          fail_on_unmatched_files: true
          files: |
            artifacts/linux/*.zip
            artifacts/windows/*.zip
            artifacts/android-quest/*.zip
            artifacts/android-pico/*.zip
