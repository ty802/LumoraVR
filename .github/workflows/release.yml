name: Release Build

# Manual-dispatch only. Builds Godot Mono release exports for Linux + Windows,
# stamps a date-based version into the binaries, packages each platform into a
# zip, and attaches them to a GitHub Release tagged v<version>.
#
# Version format: YYYY.MM.DD.<run_number> (e.g. 2026.05.07.142). Override with
# the version_override input if you need a hotfix or custom version string.
on:
  workflow_dispatch:
    inputs:
      version_override:
        description: "Version override (leave empty for date-based YYYY.MM.DD.<run>)"
        required: false
        default: ""
      release_notes:
        description: "Release notes body"
        required: false
        default: "Manual release build."
      prerelease:
        description: "Mark the GitHub Release as prerelease"
        required: false
        default: true
        type: boolean
      draft:
        description: "Create as draft (won't publish until you click 'Publish')"
        required: false
        default: false
        type: boolean

env:
  GODOT_VERSION: 4.6.2-stable
  DOTNET_VERSION: 10.0.x
  SOLUTION_PATH: LumoraGodot/Lumora.sln
  GODOT_PROJECT_DIR: LumoraGodot

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set.outputs.version }}
      tag: ${{ steps.set.outputs.tag }}
    steps:
      - id: set
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.version_override }}" ]; then
            VERSION="${{ inputs.version_override }}"
          else
            VERSION="$(date -u +%Y.%m.%d).${{ github.run_number }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

  build-linux:
    needs: version
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          submodules: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Godot + export templates
        run: |
          set -euo pipefail
          GV="${GODOT_VERSION}"

          curl -fLO "https://github.com/godotengine/godot/releases/download/${GV}/Godot_v${GV}_mono_linux_x86_64.zip"
          unzip -q "Godot_v${GV}_mono_linux_x86_64.zip"
          sudo mv "Godot_v${GV}_mono_linux_x86_64" /opt/godot
          sudo ln -s "/opt/godot/Godot_v${GV}_mono_linux.x86_64" /usr/local/bin/godot
          godot --version

          curl -fLO "https://github.com/godotengine/godot/releases/download/${GV}/Godot_v${GV}_mono_export_templates.tpz"
          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/${GV/-/.}.mono"
          mkdir -p "$TEMPLATE_DIR"
          rm -rf /tmp/tpl
          unzip -q "Godot_v${GV}_mono_export_templates.tpz" -d /tmp/tpl
          mv /tmp/tpl/templates/* "$TEMPLATE_DIR/"

      - name: Stamp BuildInfo.cs
        run: |
          set -euo pipefail
          mkdir -p LumoraCore/Source/Generated
          cat > LumoraCore/Source/Generated/BuildInfo.cs <<EOF
          // <auto-generated/>
          // Generated by .github/workflows/release.yml - do not edit by hand.
          namespace Lumora.Core;

          public static class BuildInfo
          {
              public const string Version = "${VERSION}";
              public const string Commit = "${{ github.sha }}";
              public const string Branch = "${{ github.ref_name }}";
              public const string BuildDate = "$(date -u +%Y-%m-%dT%H:%M:%SZ)";
              public const string Configuration = "ExportRelease";
          }
          EOF

      - name: Stamp export metadata
        working-directory: ${{ env.GODOT_PROJECT_DIR }}
        run: |
          set -euo pipefail
          sed -i \
            -e "s/^application\\/file_version=.*/application\\/file_version=\"${VERSION}\"/" \
            -e "s/^application\\/product_version=.*/application\\/product_version=\"${VERSION}\"/" \
            export_presets.cfg

      - name: Build .NET solution
        run: |
          dotnet restore "${SOLUTION_PATH}"
          dotnet build "${SOLUTION_PATH}" \
            --no-restore \
            --configuration ExportRelease \
            -p:Version=${VERSION}

      - name: Godot import pass
        working-directory: ${{ env.GODOT_PROJECT_DIR }}
        run: godot --headless --import || true

      - name: Export Linux
        working-directory: ${{ env.GODOT_PROJECT_DIR }}
        run: |
          set -euo pipefail
          mkdir -p ../build/linux
          godot --headless --export-release "Linux" ../build/linux/LumoraVR.x86_64
          ls -la ../build/linux

      - name: Package zip
        run: |
          set -euo pipefail
          chmod +x build/linux/LumoraVR.x86_64 || true
          cd build/linux
          zip -r "../LumoraVR-${VERSION}-linux-x64.zip" .
          cd ..
          ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: build/LumoraVR-${{ needs.version.outputs.version }}-linux-x64.zip
          if-no-files-found: error
          retention-days: 14

  build-windows:
    needs: version
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          submodules: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Godot + export templates
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $gv = $env:GODOT_VERSION

          Invoke-WebRequest -Uri "https://github.com/godotengine/godot/releases/download/$gv/Godot_v${gv}_mono_win64.zip" -OutFile godot.zip
          Expand-Archive -Path godot.zip -DestinationPath godot
          $consoleExe = Get-ChildItem godot -Recurse -Filter "*console*.exe" | Select-Object -First 1
          if (-not $consoleExe) { throw "Godot console exe not found in archive" }
          "GODOT_EXE=$($consoleExe.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Add-Content $env:GITHUB_PATH $consoleExe.Directory.FullName
          & $consoleExe.FullName --version

          Invoke-WebRequest -Uri "https://github.com/godotengine/godot/releases/download/$gv/Godot_v${gv}_mono_export_templates.tpz" -OutFile templates.tpz
          $templatesDir = Join-Path $env:APPDATA "Godot\export_templates\$($gv -replace '-','.').mono"
          New-Item -ItemType Directory -Force -Path $templatesDir | Out-Null
          if (Test-Path tpl) {
            Remove-Item tpl -Recurse -Force
          }
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          [System.IO.Compression.ZipFile]::ExtractToDirectory((Join-Path (Get-Location) "templates.tpz"), (Join-Path (Get-Location) "tpl"))
          Copy-Item -Recurse "tpl\templates\*" $templatesDir

      - name: Stamp BuildInfo.cs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p LumoraCore/Source/Generated
          cat > LumoraCore/Source/Generated/BuildInfo.cs <<EOF
          // <auto-generated/>
          // Generated by .github/workflows/release.yml - do not edit by hand.
          namespace Lumora.Core;

          public static class BuildInfo
          {
              public const string Version = "${VERSION}";
              public const string Commit = "${{ github.sha }}";
              public const string Branch = "${{ github.ref_name }}";
              public const string BuildDate = "$(date -u +%Y-%m-%dT%H:%M:%SZ)";
              public const string Configuration = "ExportRelease";
          }
          EOF

      - name: Stamp export metadata
        shell: pwsh
        working-directory: ${{ env.GODOT_PROJECT_DIR }}
        run: |
          $ErrorActionPreference = 'Stop'
          $path = "export_presets.cfg"
          $content = Get-Content $path -Raw
          $content = $content -replace 'application/file_version=".*"', "application/file_version=""$env:VERSION"""
          $content = $content -replace 'application/product_version=".*"', "application/product_version=""$env:VERSION"""
          Set-Content -Path $path -Value $content -NoNewline

      - name: Build .NET solution
        run: |
          dotnet restore ${{ env.SOLUTION_PATH }}
          dotnet build ${{ env.SOLUTION_PATH }} --no-restore --configuration ExportRelease -p:Version=${{ needs.version.outputs.version }}

      - name: Godot import pass
        working-directory: ${{ env.GODOT_PROJECT_DIR }}
        shell: pwsh
        run: |
          & $env:GODOT_EXE --headless --import
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Ignoring Godot import exit code $LASTEXITCODE"
          }

      - name: Export Windows
        working-directory: ${{ env.GODOT_PROJECT_DIR }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path "..\build\windows" | Out-Null
          & $env:GODOT_EXE --headless --export-release "Windows Desktop" ..\build\windows\LumoraVR.exe
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
          Get-ChildItem ..\build\windows

      - name: Package zip
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = "${{ needs.version.outputs.version }}"
          Compress-Archive -Path "build\windows\*" -DestinationPath "build\LumoraVR-$version-windows-x64.zip"
          Get-ChildItem build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: build/LumoraVR-${{ needs.version.outputs.version }}-windows-x64.zip
          if-no-files-found: error
          retention-days: 14

  build-android:
    needs: version
    runs-on: ubuntu-latest
    # Required GitHub Secrets for store-quality signed APKs (Meta Horizon Store
    # and Pico Store both require a stable release key fingerprint across
    # versions). If any of these are missing the workflow falls back to debug
    # signing - fine for sideloading via adb / SideQuest, NOT acceptable for
    # store submission.
    #
    #   ANDROID_RELEASE_KEYSTORE_B64       base64-encoded .keystore file
    #                                       (cat lumora-release.keystore | base64 -w0)
    #   ANDROID_RELEASE_KEYSTORE_PASSWORD  password set on the keystore at creation
    #   ANDROID_RELEASE_KEY_ALIAS          the -alias value passed to keytool -genkey
    #   ANDROID_RELEASE_KEY_PASSWORD       optional current key password, only
    #                                       needed if it differs from the
    #                                       keystore password
    #
    # Godot has one Android Release Password field. Generate the keystore with
    # matching key and keystore passwords if possible. If the passwords differ,
    # this workflow rewrites the temporary CI keystore copy before export.
    #
    # Generate the keystore once locally:
    #   keytool -genkey -v -keystore lumora-release.keystore -alias lumora \
    #           -keyalg RSA -keysize 2048 -validity 10000
    # Then base64 it and paste into the GitHub Secret.
    # - xlinka
    env:
      VERSION: ${{ needs.version.outputs.version }}
      # Android NDK pinned to the version Godot 4.6 ships with. Bumping this
      # has historically caused link-time crashes inside the OpenXR vendor
      # loaders - keep in sync with Godot release notes when upgrading.
      ANDROID_NDK_VERSION: "23.2.8568313"
      ANDROID_BUILD_TOOLS_VERSION: "34.0.0"
      ANDROID_PLATFORM: "android-34"
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          submodules: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK + cmdline-tools
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;${{ env.ANDROID_PLATFORM }} build-tools;${{ env.ANDROID_BUILD_TOOLS_VERSION }} ndk;${{ env.ANDROID_NDK_VERSION }}"

      - name: Install Godot + export templates
        run: |
          set -euo pipefail
          GV="${GODOT_VERSION}"

          curl -fLO "https://github.com/godotengine/godot/releases/download/${GV}/Godot_v${GV}_mono_linux_x86_64.zip"
          unzip -q "Godot_v${GV}_mono_linux_x86_64.zip"
          sudo mv "Godot_v${GV}_mono_linux_x86_64" /opt/godot
          sudo ln -s "/opt/godot/Godot_v${GV}_mono_linux.x86_64" /usr/local/bin/godot
          godot --version

          curl -fLO "https://github.com/godotengine/godot/releases/download/${GV}/Godot_v${GV}_mono_export_templates.tpz"
          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/${GV/-/.}.mono"
          mkdir -p "$TEMPLATE_DIR"
          rm -rf /tmp/tpl
          unzip -q "Godot_v${GV}_mono_export_templates.tpz" -d /tmp/tpl
          mv /tmp/tpl/templates/* "$TEMPLATE_DIR/"

      - name: Configure Godot editor settings (SDK + JDK paths)
        run: |
          set -euo pipefail
          # Godot's Android exporter reads tool paths from editor_settings-4.tres,
          # which doesn't exist on a fresh CI runner. We write a minimal one with
          # just the SDK + JDK pointers; everything else falls back to defaults.
          # ANDROID_HOME is set by android-actions/setup-android, JAVA_HOME by
          # actions/setup-java.
          # - xlinka
          mkdir -p "$HOME/.config/godot"
          cat > "$HOME/.config/godot/editor_settings-4.tres" <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "${ANDROID_HOME}"
          export/android/java_sdk_path = "${JAVA_HOME}"
          EOF

      - name: Stamp BuildInfo.cs
        run: |
          set -euo pipefail
          mkdir -p LumoraCore/Source/Generated
          cat > LumoraCore/Source/Generated/BuildInfo.cs <<EOF
          // <auto-generated/>
          // Generated by .github/workflows/release.yml - do not edit by hand.
          namespace Lumora.Core;

          public static class BuildInfo
          {
              public const string Version = "${VERSION}";
              public const string Commit = "${{ github.sha }}";
              public const string Branch = "${{ github.ref_name }}";
              public const string BuildDate = "$(date -u +%Y-%m-%dT%H:%M:%SZ)";
              public const string Configuration = "ExportRelease";
          }
          EOF

      - name: Stamp export metadata
        working-directory: ${{ env.GODOT_PROJECT_DIR }}
        run: |
          set -euo pipefail
          sed -i \
            -e "s/^application\\/file_version=.*/application\\/file_version=\"${VERSION}\"/" \
            -e "s/^application\\/product_version=.*/application\\/product_version=\"${VERSION}\"/" \
            export_presets.cfg

      - name: Configure Android release keystore
        working-directory: ${{ env.GODOT_PROJECT_DIR }}
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${KEYSTORE_B64:-}" ] || [ -z "${KEYSTORE_PASSWORD:-}" ] || [ -z "${KEY_ALIAS:-}" ]; then
            echo "::warning::One or more Android release keystore secrets are not set."
            echo "::warning::APKs will be debug-signed - fine for sideloading, NOT acceptable for store submission."
            echo "::warning::Required secrets: ANDROID_RELEASE_KEYSTORE_B64, ANDROID_RELEASE_KEYSTORE_PASSWORD, ANDROID_RELEASE_KEY_ALIAS"
            exit 0
          fi

          # Decode the keystore into the project root so the Godot exporter can
          # find it via the absolute path passed through Godot's documented
          # Android export environment overrides.
          printf '%s' "${KEYSTORE_B64}" | base64 -d > release.keystore
          echo "::add-mask::${KEYSTORE_PASSWORD}"
          echo "::add-mask::${KEY_ALIAS}"
          if [ -n "${KEY_PASSWORD:-}" ]; then
            echo "::add-mask::${KEY_PASSWORD}"
          fi

          KEY_ENTRY_PASSWORD="${KEY_PASSWORD:-$KEYSTORE_PASSWORD}"
          if [ "${KEY_ENTRY_PASSWORD}" != "${KEYSTORE_PASSWORD}" ]; then
            echo "Aligning temporary Android key password with keystore password for Godot export."
            if ! keytool -keypasswd \
              -alias "${KEY_ALIAS}" \
              -keystore release.keystore \
              -storepass "${KEYSTORE_PASSWORD}" \
              -keypass "${KEY_ENTRY_PASSWORD}" \
              -new "${KEYSTORE_PASSWORD}" \
              >/dev/null 2>&1; then
              echo "::error::Android key password update failed."
              echo "::error::Check ANDROID_RELEASE_KEY_PASSWORD, ANDROID_RELEASE_KEYSTORE_PASSWORD, and ANDROID_RELEASE_KEY_ALIAS."
              exit 1
            fi
          fi

          # Godot performs this same `keytool -list` check before export.
          # Keep it here so bad secrets fail before any APK build work starts.
          KEYTOOL_OUTPUT="$(mktemp)"
          if ! keytool -list \
            -keystore release.keystore \
            -storepass "${KEYSTORE_PASSWORD}" \
            -alias "${KEY_ALIAS}" \
            >"${KEYTOOL_OUTPUT}" 2>&1; then
            echo "::error::Android release keystore validation failed."
            echo "::error::Check ANDROID_RELEASE_KEYSTORE_PASSWORD and ANDROID_RELEASE_KEY_ALIAS."
            echo "keytool validation output:"
            sed -e 's/[[:cntrl:]]//g' "${KEYTOOL_OUTPUT}" || true
            rm -f "${KEYTOOL_OUTPUT}"
            exit 1
          fi
          rm -f "${KEYTOOL_OUTPUT}"

          echo "Android release keystore validation passed."
          echo "Release keystore configured: $(stat -c '%s bytes' release.keystore)"

      - name: Build .NET solution
        run: |
          dotnet restore "${SOLUTION_PATH}"
          dotnet build "${SOLUTION_PATH}" \
            --no-restore \
            --configuration ExportRelease \
            -p:Version=${VERSION}

      - name: Godot import pass
        working-directory: ${{ env.GODOT_PROJECT_DIR }}
        run: godot --headless --import || true

      - name: Install Android build template (manual extract)
        working-directory: ${{ env.GODOT_PROJECT_DIR }}
        run: |
          set -euo pipefail
          # The "official" route is `godot --headless --install-android-build-template`
          # but that runs Godot in editor mode, which loads C# scripts via the
          # editor's Debug-config assembly. We only build ExportRelease here,
          # so the editor pass dies with "Cannot instantiate C# script".
          #
          # Editor mode also tries to spin up OpenXR (because xr/openxr/enabled
          # is true in project.godot) and logs a noisy failure on Linux CI with
          # no runtime installed. Avoiding the editor pass kills that too.
          #
          # Instead we extract android_source.zip directly. That zip ships
          # inside the mono export templates and IS what install-android-build-
          # template would have extracted - we just cut Godot out of the loop.
          # - xlinka
          GV="${GODOT_VERSION}"
          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/${GV/-/.}.mono"
          ANDROID_TEMPLATE_ZIP="${TEMPLATE_DIR}/android_source.zip"

          if [ ! -f "${ANDROID_TEMPLATE_ZIP}" ]; then
            echo "Android build template zip not found at: ${ANDROID_TEMPLATE_ZIP}"
            echo "Listing template dir for debugging:"
            ls -la "${TEMPLATE_DIR}" || true
            exit 1
          fi

          # Godot's --install-android-build-template extracts the zip into
          # `android/build/` (not into `android/` itself). The zip's root
          # contains the build files at top level. Extract there so paths
          # line up with what gradle and the export preset expect.
          rm -rf android
          mkdir -p android/build
          unzip -q -o "${ANDROID_TEMPLATE_ZIP}" -d android/build/
          test -f android/build/build.gradle || { echo "Android build template extracted but build.gradle missing"; ls -laR android || true; exit 1; }
          echo "Android build template installed at android/build/"

      - name: Configure Godot Android export credentials
        working-directory: ${{ env.GODOT_PROJECT_DIR }}
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
        run: |
          set -euo pipefail

          if [ ! -f release.keystore ] || [ -z "${KEYSTORE_PASSWORD:-}" ] || [ -z "${KEY_ALIAS:-}" ]; then
            echo "::warning::Release keystore credentials are incomplete; Godot will use preset/default signing settings."
            exit 0
          fi

          echo "::add-mask::${KEYSTORE_PASSWORD}"
          echo "::add-mask::${KEY_ALIAS}"
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          keystore_path = str(Path("release.keystore").resolve())
          key_alias = os.environ["KEY_ALIAS"]
          keystore_password = os.environ["KEYSTORE_PASSWORD"]

          def q(value: str) -> str:
              return json.dumps(value)

          content = f"""[preset.2]

          script_encryption_key=""

          [preset.2.options]

          keystore/debug=""
          keystore/debug_user=""
          keystore/debug_password=""
          keystore/release={q(keystore_path)}
          keystore/release_user={q(key_alias)}
          keystore/release_password={q(keystore_password)}

          [preset.3]

          script_encryption_key=""

          [preset.3.options]

          keystore/debug=""
          keystore/debug_user=""
          keystore/debug_password=""
          keystore/release={q(keystore_path)}
          keystore/release_user={q(key_alias)}
          keystore/release_password={q(keystore_password)}
          """

          credentials_path = Path(".godot/export_credentials.cfg")
          credentials_path.parent.mkdir(parents=True, exist_ok=True)
          credentials_path.write_text(content, encoding="utf-8")

          preset_path = Path("export_presets.cfg")
          lines = preset_path.read_text(encoding="utf-8").splitlines(keepends=True)
          current_preset = None
          patched = []
          for line in lines:
              stripped = line.strip()
              if stripped.startswith("[preset.") and stripped.endswith("]") and ".options" not in stripped:
                  current_preset = stripped.removeprefix("[preset.").removesuffix("]")
              if current_preset in {"2", "3"}:
                  if line.startswith("keystore/release="):
                      line = f"keystore/release={q(keystore_path)}\n"
                  elif line.startswith("keystore/release_user="):
                      line = f"keystore/release_user={q(key_alias)}\n"
                  elif line.startswith("keystore/release_password="):
                      line = f"keystore/release_password={q(keystore_password)}\n"
              patched.append(line)
          preset_path.write_text("".join(patched), encoding="utf-8")
          PY

          echo "Godot export credentials configured for Android presets."
          echo "Godot export presets patched for Android signing in this CI workspace."

      - name: Export Quest APK
        working-directory: ${{ env.GODOT_PROJECT_DIR }}
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
        run: |
          set -euo pipefail

          echo "Quest export diagnostics:"
          echo "- workflow debug revision: android-quest-signing-v3"
          echo "- working directory: $(pwd)"
          echo "- release.keystore present: $([ -f release.keystore ] && echo yes || echo no)"
          if [ -f release.keystore ]; then
            echo "- release.keystore size: $(stat -c '%s bytes' release.keystore)"
          fi
          echo "- android/build/build.gradle present: $([ -f android/build/build.gradle ] && echo yes || echo no)"
          echo "- KEYSTORE_PASSWORD set: $([ -n "${KEYSTORE_PASSWORD:-}" ] && echo yes || echo no)"
          echo "- KEY_ALIAS set: $([ -n "${KEY_ALIAS:-}" ] && echo yes || echo no)"
          echo "- export_presets release fields set:"
          awk -F= '
            /^keystore\/release="/ { print "  release path: " ($2 == "\"\"" ? "empty" : "set") }
            /^keystore\/release_user="/ { print "  release user: " ($2 == "\"\"" ? "empty" : "set") }
            /^keystore\/release_password="/ { print "  release password: " ($2 == "\"\"" ? "empty" : "set") }
          ' export_presets.cfg

          if [ -f release.keystore ] && [ -n "${KEYSTORE_PASSWORD:-}" ] && [ -n "${KEY_ALIAS:-}" ]; then
            echo "::add-mask::${KEYSTORE_PASSWORD}"
            echo "::add-mask::${KEY_ALIAS}"
            KEYTOOL_OUTPUT="$(mktemp)"
            if ! keytool -list \
              -keystore release.keystore \
              -storepass "${KEYSTORE_PASSWORD}" \
              -alias "${KEY_ALIAS}" \
              >"${KEYTOOL_OUTPUT}" 2>&1; then
              echo "::error::Godot signing credentials are not valid for release.keystore."
              echo "keytool validation output:"
              sed -e 's/[[:cntrl:]]//g' "${KEYTOOL_OUTPUT}" || true
              rm -f "${KEYTOOL_OUTPUT}"
              exit 1
            fi
            rm -f "${KEYTOOL_OUTPUT}"
            echo "- Godot-style keytool validation: passed"
            echo "- export_credentials release fields set:"
            awk -F= '
              /^keystore\/release=/ { print "  release path: " ($2 == "\"\"" ? "empty" : "set") }
              /^keystore\/release_user=/ { print "  release user: " ($2 == "\"\"" ? "empty" : "set") }
              /^keystore\/release_password=/ { print "  release password: " ($2 == "\"\"" ? "empty" : "set") }
            ' .godot/export_credentials.cfg
            export GODOT_ANDROID_KEYSTORE_RELEASE_PATH="$(pwd)/release.keystore"
            export GODOT_ANDROID_KEYSTORE_RELEASE_USER="${KEY_ALIAS}"
            export GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD="${KEYSTORE_PASSWORD}"
            echo "- Godot release keystore override path exists: $([ -f "${GODOT_ANDROID_KEYSTORE_RELEASE_PATH}" ] && echo yes || echo no)"
            echo "- Godot release keystore override user set: yes"
            echo "- Godot release keystore override password set: yes"
          else
            echo "::warning::Release keystore override not configured for Quest export; Godot may fail release signing."
          fi

          mkdir -p ../build/android
          godot --headless --verbose --export-release "Quest" ../build/android/LumoraVR-Quest.apk
          ls -la ../build/android

      - name: Export Pico APK
        working-directory: ${{ env.GODOT_PROJECT_DIR }}
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
        run: |
          set -euo pipefail
          if [ -f release.keystore ] && [ -n "${KEYSTORE_PASSWORD:-}" ] && [ -n "${KEY_ALIAS:-}" ]; then
            echo "::add-mask::${KEYSTORE_PASSWORD}"
            echo "::add-mask::${KEY_ALIAS}"
            if ! keytool -list \
              -keystore release.keystore \
              -storepass "${KEYSTORE_PASSWORD}" \
              -alias "${KEY_ALIAS}" \
              >/dev/null 2>&1; then
              echo "::error::Godot signing credentials are not valid for release.keystore."
              exit 1
            fi
            export GODOT_ANDROID_KEYSTORE_RELEASE_PATH="$(pwd)/release.keystore"
            export GODOT_ANDROID_KEYSTORE_RELEASE_USER="${KEY_ALIAS}"
            export GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD="${KEYSTORE_PASSWORD}"
          fi
          godot --headless --export-release "Pico" ../build/android/LumoraVR-Pico.apk
          ls -la ../build/android

      # Defence-in-depth: remove the decoded keystore and Godot credentials as
      # soon as both Android exports have finished. The uploaded artifacts below
      # only need the generated APKs/zips.
      - name: Scrub Android signing credentials from workspace
        if: always()
        working-directory: ${{ env.GODOT_PROJECT_DIR }}
        run: |
          rm -f release.keystore || true
          rm -f .godot/export_credentials.cfg || true
          sed -i \
            -e 's|^keystore/release=".*"|keystore/release=""|' \
            -e 's|^keystore/release_user=".*"|keystore/release_user=""|' \
            -e 's|^keystore/release_password=".*"|keystore/release_password=""|' \
            export_presets.cfg || true

      - name: Package zips
        run: |
          set -euo pipefail
          cd build/android
          zip "../LumoraVR-${VERSION}-quest.zip" LumoraVR-Quest.apk
          zip "../LumoraVR-${VERSION}-pico.zip"  LumoraVR-Pico.apk
          cd ..
          ls -la

      - name: Upload Quest artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-quest
          path: build/LumoraVR-${{ needs.version.outputs.version }}-quest.zip
          if-no-files-found: error
          retention-days: 14

      - name: Upload Pico artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-pico
          path: build/LumoraVR-${{ needs.version.outputs.version }}-pico.zip
          if-no-files-found: error
          retention-days: 14

  release:
    needs: [version, build-linux, build-windows, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -laR artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          body: ${{ inputs.release_notes }}
          prerelease: ${{ inputs.prerelease }}
          draft: ${{ inputs.draft }}
          fail_on_unmatched_files: true
          files: |
            artifacts/linux/*.zip
            artifacts/windows/*.zip
            artifacts/android-quest/*.zip
            artifacts/android-pico/*.zip
