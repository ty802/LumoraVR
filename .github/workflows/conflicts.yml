name: Check for merge conflicts
# auto-labels PRs that have conflicts so reviewers don't have to play detective
# mschilde/auto-label-merge-conflicts was abandoned in 2021, switched to eps1lon's fork
# which is actually maintained unlike some people's PRs
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# without these perms the action silently does nothing, which is a great way to waste an hour
permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: eps1lon/actions-label-merge-conflict@v3
        with:
          dirtyLabel: "Has Conflicts"
          repoToken: ${{ secrets.GITHUB_TOKEN }}
